<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MailRob</title>
<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Jouw originele styling */
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#b2e8cc;--s1:#c8eedd;--s2:#d8f5e8;--s3:#e4f9ef;--border:#7ac8a0;
    --teal:#1a7a42;--tdim:rgba(26,122,66,.12);--text:#0a2818;--sub:#1e5c3a;
    --danger:#cc2200;--white:#ffffff;--shadow:0 10px 30px rgba(0,0,0,.08);
  }
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;height:100vh}
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;text-align:center}
  .login-card{background:var(--white);padding:32px;border-radius:24px;width:100%;max-width:340px;box-shadow:var(--shadow)}
  input{width:100%;padding:14px;margin-bottom:12px;border-radius:12px;border:1px solid var(--border);font-family:inherit;font-size:16px}
  .btn-primary{width:100%;padding:14px;background:var(--teal);color:var(--white);border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer}
  .btn-outlook{width:100%;padding:14px;background:#0078d4;color:white;border:none;border-radius:12px;font-weight:600;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
  #app{display:none} /* Verberg app tot inloggen */
</style>
</head>
<body>

<div id="setup" class="login-screen">
  <div class="login-card">
    <h1 style="font-family:'Syne',sans-serif;margin-bottom:8px">MailRob</h1>
    <p style="opacity:.6;margin-bottom:24px">Kies je account</p>
    
    <input type="email" id="li-e" placeholder="E-mailadres">
    <input type="password" id="li-p" placeholder="Wachtwoord">
    <button onclick="doLogin()" class="btn-primary">Inloggen</button>
    
    <div style="margin:15px 0; opacity:0.3; font-size:12px">OF</div>
    
    <button onclick="loginOutlook()" class="btn-outlook">
      <svg style="width:18px" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"/></svg>
      Outlook
    </button>
  </div>
</div>

<div id="app">
  <div id="inbox-body" style="padding:20px">Laden...</div>
</div>

<script>
const qs = s => document.querySelector(s);
let inbox = [];

// 1. MICROSOFT CONFIGURATIE (Vul hier je eigen gegevens in)
const msalConfig = {
    auth: {
        clientId: "5717b445-f820-4548-9c59-c65eccc41900", // Jouw ID van de screenshot
        authority: "https://login.microsoftonline.com/common",
        redirectUri: "https://rob-smits.github.io/MailRob/" // Je exacte GitHub URL
    },
    cache: {
        cacheLocation: "localStorage",
        storeAuthStateInCookie: true
    }
};

const myMSALObj = new msal.PublicClientApplication(msalConfig);

// 2. INLOG FUNCTIE
async function loginOutlook() {
    try {
        const loginRequest = { scopes: ["openid", "profile", "Mail.Read", "offline_access"] };
        const response = await myMSALObj.loginPopup(loginRequest);
        
        qs('#setup').style.display = 'none';
        qs('#app').style.display = 'block';
        
        fetchOutlookEmails();
    } catch (error) {
        console.error(error);
        alert("Inloggen mislukt");
    }
}

// 3. E-MAIL OPHALEN (Zonder vastlopen)
async function fetchOutlookEmails() {
    try {
        const accounts = myMSALObj.getAllAccounts();
        if (accounts.length === 0) return;

        const tokenResponse = await myMSALObj.acquireTokenSilent({
            scopes: ["Mail.Read"],
            account: accounts[0]
        });

        const response = await fetch("https://graph.microsoft.com/v1.0/me/messages?$top=15", {
            headers: { "Authorization": `Bearer ${tokenResponse.accessToken}` }
        });

        const data = await response.json();
        
        // Mails tonen op het scherm
        let html = '<h2>Jouw Outlook Mail</h2>';
        data.value.forEach(m => {
            html += `<div style="background:white; margin:10px 0; padding:15px; border-radius:12px; border:1px dashed var(--border)">
                <b>${m.from.emailAddress.name}</b><br>${m.subject}
            </div>`;
        });
        qs('#inbox-body').innerHTML = html;

    } catch (error) {
        console.error(error);
    }
}

function doLogin() {
    alert("Ziggo/Gmail login...");
}
</script>

</body>
</html>
